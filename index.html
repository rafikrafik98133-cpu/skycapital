<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sky Capital FIX</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #stats { text-align: center; margin-top: 20px; }
        #league { font-size: 14px; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; }
        #plane-name { font-size: 26px; font-weight: bold; margin: 5px 0; }
        #balance { font-size: 50px; font-weight: 900; color: #fff; margin: 10px 0; }
        .circle { 
            width: 260px; height: 260px; border-radius: 50%; border: 8px solid #38bdf8;
            display: flex; justify-content: center; align-items: center; 
            background: #0f172a; cursor: pointer; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2); transition: 0.1s;
        }
        .circle:active { transform: scale(0.95); }
        .plane-icon { font-size: 100px; }
        .info-panel { display: flex; gap: 20px; margin: 20px 0; background: rgba(255,255,255,0.05); padding: 10px 30px; border-radius: 15px; }
        .btn-main { background: #38bdf8; color: #000; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #shop-ui { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #020617; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .oil-card { background: #1e293b; padding: 15px; margin: 5px; width: 80%; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>
    <div id="stats">
        <div id="league">Бронзовая лига</div>
        <div id="plane-name">МиГ-21</div>
        <div id="balance">2567</div>
        <div id="timer" style="color:#fbbf24; font-size: 12px; height: 15px;"></div>
    </div>

    <div class="circle" id="click-btn"><div class="plane-icon" id="plane-img">🛫</div></div>

    <div class="info-panel">
        <div>Клик: <b id="pwr">+2</b></div>
        <div>В час: <b id="afk">500</b></div>
    </div>

    <button class="btn-main" onclick="openShop(true)">🛒 МАГАЗИН</button>

    <div id="shop-ui">
        <h2>МАСЛА</h2>
        <div class="oil-card" onclick="buyOil(10000, 0.05)">ОБЫЧНОЕ (10к)</div>
        <div class="oil-card" onclick="buyOil(100000, 0.1)">КАЧЕСТВЕННОЕ (100к)</div>
        <button class="btn-main" style="margin-top:20px; background:#64748b" onclick="openShop(false)">ЗАКРЫТЬ</button>
    </div>

    <script>
        // Принудительно ставим твои данные, если память пуста
        let score = parseFloat(localStorage.getItem('sky_score')) || 2567;
        let oilEnd = parseInt(localStorage.getItem('sky_oilEnd')) || 0;
        let oilBonus = parseFloat(localStorage.getItem('sky_oilBonus')) || 0;

        const lvls = [
            { lim: 0, n: "МиГ-9", l: "🪵 Деревянная лига", p: 1, a: 100, c: "#8b4513", img: "✈️" },
            { lim: 1000, n: "МиГ-21", l: "🥉 Бронзовая лига", p: 2, a: 500, c: "#cd7f32", img: "🛫" },
            { lim: 10000, n: "МиГ-23", l: "🥉 Бронзовая лига", p: 3, a: 1500, c: "#cd7f32", img: "🛬" }
        ];

        function openShop(s) { document.getElementById('shop-ui').style.display = s ? 'flex' : 'none'; }

        function update() {
            let cur = lvls[0];
            for (let i = lvls.length - 1; i >= 0; i--) if (score >= lvls[i].lim) { cur = lvls[i]; break; }
            let now = Date.now();
            let b = (now < oilEnd) ? oilBonus : 0;

            document.getElementById('balance').innerText = Math.floor(score).toLocaleString();
            document.getElementById('plane-name').innerText = cur.n;
            document.getElementById('league').innerText = cur.l;
            document.getElementById('league').style.color = cur.c;
            document.getElementById('pwr').innerText = "+" + cur.p;
            document.getElementById('afk').innerText = Math.floor(cur.a * (1 + b)).toLocaleString();
            document.getElementById('plane-img').innerText = cur.img;
            document.getElementById('click-btn').style.borderColor = cur.c;
            
            if (now < oilEnd) {
                let d = Math.floor((oilEnd - now) / 1000);
                document.getElementById('timer').innerText = `МАСЛО: ${Math.floor(d/60)}:${(d%60).toString().padStart(2,'0')}`;
            } else document.getElementById('timer').innerText = "";
            localStorage.setItem('sky_score', score);
        }

        document.getElementById('click-btn').onclick = () => {
            let p = 1;
            for (let i = lvls.length - 1; i >= 0; i--) if (score >= lvls[i].lim) { p = lvls[i].p; break; }
            score += p; update();
        };

        function buyOil(p, b) { if(score >= p) { score -= p; oilEnd = Date.now() + 3600000; oilBonus = b; openShop(false); update(); } }

        setInterval(() => {
            let cur = lvls[0];
            for (let i = lvls.length - 1; i >= 0; i--) if (score >= lvls[i].lim) { cur = lvls[i]; break; }
            let b = (Date.now() < oilEnd) ? oilBonus : 0;
            score += (cur.a * (1 + b)) / 3600; update();
        }, 1000);

        update();
    </script>
</body>
</html>
