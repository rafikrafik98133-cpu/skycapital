<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sky Capital Elite</title>
    <style>
        :root { --main-blue: #38bdf8; --bg-dark: #020617; }
        body { background: var(--bg-dark); color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        #stats { margin-top: 30px; text-align: center; z-index: 2; }
        #league { font-size: 14px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.8; margin-bottom: 5px; }
        #plane-name { font-size: 28px; font-weight: 900; color: var(--main-blue); text-shadow: 0 0 15px var(--main-blue); }
        #balance { font-size: 55px; font-weight: 900; margin: 10px 0; background: linear-gradient(to bottom, #fff, var(--main-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Центральный круг с неоном */
        .circle-container { position: relative; margin: 30px 0; }
        .circle { 
            width: 280px; height: 280px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px);
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid; position: relative; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.1);
        }
        .circle:active { transform: scale(0.95); box-shadow: 0 0 80px var(--main-blue); }
        .plane-icon { font-size: 130px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); }

        /* Панель инфо */
        .info-panel { 
            background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 40px; border-radius: 20px; display: flex; gap: 30px;
            backdrop-filter: blur(5px); margin-bottom: 20px;
        }
        .info-item { text-align: center; }
        .info-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .info-value { font-size: 18px; font-weight: bold; color: var(--main-blue); }

        /* Кнопка магазина */
        #shop-toggle {
            background: linear-gradient(135deg, var(--main-blue), #0ea5e9);
            color: white; border: none; padding: 15px 50px; font-weight: bold;
            border-radius: 15px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px; box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
            transition: 0.3s;
        }
        #shop-toggle:hover { transform: translateY(-3px); }

        /* Магазин */
        #shop-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; }
        .oil-card { 
            background: #0f172a; border: 1px solid #1e293b; padding: 20px 10px;
            border-radius: 20px; text-align: center; transition: 0.3s;
        }
        .oil-card:active { border-color: var(--main-blue); background: #1e293b; }
        .oil-card b { display: block; color: var(--main-blue); margin-bottom: 5px; font-size: 16px; }

        #timer { color: #fbbf24; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
        .close-btn { margin-top: 40px; color: #64748b; cursor: pointer; }
    </style>
</head>
<body>
    <div id="stats">
        <div id="league">Загрузка протокола...</div>
        <div id="plane-name">---</div>
        <div id="balance">0</div>
        <div id="timer"></div>
